<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPal — Mental Health Companion</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class', // Enables dark mode based on a CSS class
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        surface: '#f0f4f9', // Smooth light gray
                        surfaceHover: '#e5e9ee',
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar for the textarea and chat area */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        
        /* Hide scrollbar for clean look unless scrolling */
        textarea::-webkit-scrollbar {
            width: 0px;
        }
        textarea:focus::-webkit-scrollbar {
            width: 8px;
        }
        
        .dropdown-enter {
            opacity: 0;
            transform: scale(0.95) translateY(10px);
        }
        .dropdown-enter-active {
            opacity: 1;
            transform: scale(1) translateY(0);
            transition: opacity 200ms ease-out, transform 200ms ease-out;
        }
        .dropdown-exit {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        .dropdown-exit-active {
            opacity: 0;
            transform: scale(0.95) translateY(10px);
            transition: opacity 150ms ease-in, transform 150ms ease-in;
        }

        /* Welcome copy intro animation */
        @keyframes revealUp {
            0% {
                opacity: 0;
                transform: translateY(18px) scale(0.985);
                filter: blur(4px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes softGlow {
            0%, 100% { text-shadow: 0 0 0 rgba(59, 130, 246, 0); }
            50% { text-shadow: 0 0 20px rgba(59, 130, 246, 0.14); }
        }

        .welcome-title,
        .welcome-subtitle {
            opacity: 0;
            animation: revealUp 760ms cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
            will-change: transform, opacity, filter;
        }

        .welcome-title {
            animation-delay: 120ms;
            animation-duration: 860ms;
        }

        .welcome-subtitle {
            animation-delay: 380ms;
            animation-duration: 920ms;
        }

        .welcome-title span {
            display: inline-block;
            animation: softGlow 2.6s ease-in-out 1.2s 1;
        }

        /* Optional one-time typewriter effect for the main title */
        .welcome-title.typewriter span {
            width: 0;
            max-width: max-content;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid rgba(59, 130, 246, 0.6);
            animation:
                typing 1.25s steps(28, end) 0.42s forwards,
                caretBlink 680ms step-end 0.42s 4,
                softGlow 2.6s ease-in-out 1.2s 1;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes caretBlink {
            0%, 100% { border-right-color: rgba(59, 130, 246, 0.65); }
            50% { border-right-color: transparent; }
        }

        @keyframes pulseDots {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.35; }
            40% { transform: scale(1); opacity: 1; }
        }

        @keyframes botFadeIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
                filter: blur(2px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .thinking-dot {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: currentColor;
            animation: pulseDots 1s infinite ease-in-out;
        }

        .thinking-dot:nth-child(2) { animation-delay: 0.12s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.24s; }

        .typing-caret::after {
            content: "";
            display: inline-block;
            width: 2px;
            height: 1em;
            vertical-align: text-bottom;
            margin-left: 2px;
            background: rgba(59, 130, 246, 0.6);
            animation: caretBlink 0.8s step-end infinite;
        }

        .bot-fade-in {
            animation: botFadeIn 260ms ease-out both;
        }

        @media (prefers-reduced-motion: reduce) {
            .welcome-title,
            .welcome-subtitle,
            .welcome-title span {
                animation: none !important;
                opacity: 1;
                transform: none;
                filter: none;
            }

            .welcome-title.typewriter span {
                width: auto;
                border-right: none;
            }
        }
    </style>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200 h-screen flex flex-col font-sans overflow-hidden antialiased transition-colors duration-300">

    <!-- Header / Navbar -->
    <header class="flex items-center justify-between px-6 py-4 border-b border-transparent transition-all duration-300" id="header">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-blue-50 dark:bg-blue-900/30 flex items-center justify-center text-blue-500 dark:text-blue-400">
                <i data-lucide="brain" class="w-5 h-5"></i>
            </div>
            <span class="text-xl font-medium tracking-tight text-gray-700 dark:text-gray-200">MindPal</span>
        </div>
        <div class="flex items-center gap-3 text-gray-500 dark:text-gray-400">
            <!-- Theme Toggle Button -->
            <button id="theme-toggle-btn" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors" title="Toggle Dark Mode">
                <i data-lucide="moon" class="w-5 h-5" id="theme-icon"></i>
            </button>
            <button class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors" title="Settings">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto flex flex-col relative pb-44" id="chat-container">
        
        <!-- Welcome Screen (Visible initially) -->
        <div id="welcome-screen" class="flex-1 flex flex-col items-center justify-center p-6 max-w-3xl mx-auto w-full animate-fade-in text-center mt-[-10vh]">
            <div class="w-16 h-16 rounded-2xl bg-blue-50 dark:bg-blue-900/30 text-blue-500 dark:text-blue-400 flex items-center justify-center mb-6 shadow-sm">
                <i data-lucide="leaf" class="w-8 h-8"></i>
            </div>
            <h1 class="welcome-title typewriter text-3xl sm:text-4xl font-semibold text-gray-800 dark:text-gray-100 mb-3"><span>How are you feeling today?</span></h1>
            <p class="welcome-subtitle text-gray-500 dark:text-gray-400 text-lg mb-8 max-w-lg">I'm a private, safe space to talk, reframe your thoughts, or find mental health resources.</p>
            
            <!-- Suggestion Chips -->
            <div class="flex flex-wrap justify-center gap-3">
                <button class="px-4 py-2 rounded-full border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 text-sm font-medium text-gray-600 dark:text-gray-300 transition-colors shadow-sm flex items-center gap-2 suggestion-btn">
                    <i data-lucide="zap" class="w-4 h-4 text-amber-500"></i>
                    Reality Check
                </button>
                <button class="px-4 py-2 rounded-full border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 text-sm font-medium text-gray-600 dark:text-gray-300 transition-colors shadow-sm flex items-center gap-2 suggestion-btn">
                    <i data-lucide="puzzle" class="w-4 h-4 text-blue-500 dark:text-blue-400"></i>
                    Unscramble thoughts
                </button>
                <button class="px-4 py-2 rounded-full border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 text-sm font-medium text-gray-600 dark:text-gray-300 transition-colors shadow-sm flex items-center gap-2 suggestion-btn">
                    <i data-lucide="book-heart" class="w-4 h-4 text-rose-500 dark:text-rose-400"></i>
                    Find resources
                </button>
            </div>
        </div>

        <!-- Chat History (Hidden initially) -->
        <div id="chat-history" class="hidden flex-col gap-6 p-4 max-w-4xl mx-auto w-full pb-44 pt-8">
            <!-- Messages will be injected here -->
        </div>

    </main>

    <!-- Input Area Container (Fixed at bottom) -->
    <div class="w-full bg-gradient-to-t from-white via-white dark:from-gray-900 dark:via-gray-900 to-transparent pt-6 pb-6 px-4 absolute bottom-0 left-0 right-0">
        <div class="max-w-4xl mx-auto relative">
            
            <!-- The Input Box -->
            <div class="bg-surface dark:bg-gray-800 rounded-[28px] p-3 flex flex-col relative focus-within:ring-1 ring-gray-300 dark:ring-gray-600 focus-within:bg-white dark:focus-within:bg-gray-800 transition-all shadow-sm group">
                
                <!-- Textarea -->
                <textarea 
                    id="chat-input"
                    rows="1"
                    class="bg-transparent resize-none outline-none w-full max-h-[200px] px-3 py-3 text-gray-800 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 leading-relaxed"
                    placeholder="What can I do for you?"
                    style="min-height: 52px;"
                ></textarea>

                <!-- Bottom Controls Row -->
                <div class="flex items-center justify-between px-1 mt-1">
                    
                    <!-- Left: Mode Selector & Attachment -->
                    <div class="flex items-center gap-1 relative">
                        
                        <!-- Mode Selector Button -->
                        <button id="mode-selector-btn" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl hover:bg-black/5 dark:hover:bg-white/10 text-sm font-medium text-gray-600 dark:text-gray-300 transition-colors">
                            <span id="current-mode-icon-slot" class="w-4 h-4 flex items-center justify-center text-blue-500 dark:text-blue-400" aria-hidden="true"></span>
                            <span id="current-mode-text">Companion</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 dark:text-gray-500"></i>
                        </button>

                        <!-- Dropdown Menu (Hidden by default) -->
                        <div id="mode-dropdown" class="absolute bottom-full left-0 mb-2 w-56 bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-2xl shadow-lg p-2 hidden z-50">
                            <div class="text-xs font-semibold text-gray-400 dark:text-gray-500 px-3 mb-1 mt-1 uppercase tracking-wider">Select Mode</div>
                            
                            <button class="w-full flex items-start gap-3 px-3 py-2.5 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-left mode-option" data-mode="Companion" data-icon="message-circle-heart">
                                <i data-lucide="message-circle-heart" class="w-5 h-5 text-blue-500 dark:text-blue-400 mt-0.5"></i>
                                <div>
                                    <div class="text-sm font-medium text-gray-700 dark:text-gray-200">Companion</div>
                                    <div class="text-xs text-gray-500 dark:text-gray-400">General emotional support</div>
                                </div>
                            </button>
                            
                            <button class="w-full flex items-start gap-3 px-3 py-2.5 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-left mode-option" data-mode="Cognitive Tools" data-icon="brain-circuit">
                                <i data-lucide="brain-circuit" class="w-5 h-5 text-purple-500 dark:text-purple-400 mt-0.5"></i>
                                <div>
                                    <div class="text-sm font-medium text-gray-700 dark:text-gray-200">Cognitive Tools</div>
                                    <div class="text-xs text-gray-500 dark:text-gray-400">Unscramble & reality check</div>
                                </div>
                            </button>

                            <button class="w-full flex items-start gap-3 px-3 py-2.5 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-left mode-option" data-mode="Resources" data-icon="library">
                                <i data-lucide="library" class="w-5 h-5 text-emerald-500 dark:text-emerald-400 mt-0.5"></i>
                                <div>
                                    <div class="text-sm font-medium text-gray-700 dark:text-gray-200">Resources</div>
                                    <div class="text-xs text-gray-500 dark:text-gray-400">Look up crisis & safety info</div>
                                </div>
                            </button>
                        </div>

                        <!-- Divider -->
                        <div class="w-[1px] h-4 bg-gray-300 dark:bg-gray-600 mx-1"></div>

                        <!-- Feature Toggle Button -->
                        <button id="feature-toggle-btn" class="p-2 rounded-full hover:bg-amber-50 dark:hover:bg-amber-500/10 text-gray-500 dark:text-gray-400 transition-all duration-200 relative group/tooltip" title="Toggle Concise Mode">
                            <i data-lucide="sparkles" class="w-5 h-5"></i>
                        </button>

                    </div>

                    <!-- Right: Send Button -->
                    <button id="send-btn" disabled class="p-2.5 rounded-full bg-surfaceHover dark:bg-gray-700 text-gray-400 dark:text-gray-500 transition-all duration-200 disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center">
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Disclaimer -->
            <div class="text-center mt-3 text-xs text-gray-400 dark:text-gray-500 font-medium">
                MindPal provides safe, privacy-minded support. It is not a replacement for professional medical help.
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Theme Setup
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        const themeIcon = document.getElementById('theme-icon');

        // Check for saved theme preference or use system preference
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeIcon.setAttribute('data-lucide', 'sun');
        } else {
            document.documentElement.classList.remove('dark');
            themeIcon.setAttribute('data-lucide', 'moon');
        }
        lucide.createIcons();

        // Handle Theme Toggle
        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
                themeIcon.setAttribute('data-lucide', 'sun');
            } else {
                localStorage.setItem('theme', 'light');
                themeIcon.setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons(); // re-render the specific icon
        });

        // Elements
        const inputEl = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const modeBtn = document.getElementById('mode-selector-btn');
        const modeDropdown = document.getElementById('mode-dropdown');
        const currentModeText = document.getElementById('current-mode-text');
        const currentModeIconSlot = document.getElementById('current-mode-icon-slot');
        const modeOptions = document.querySelectorAll('.mode-option');
        const featureToggleBtn = document.getElementById('feature-toggle-btn');
        
        const welcomeScreen = document.getElementById('welcome-screen');
        const chatHistory = document.getElementById('chat-history');
        const chatContainer = document.getElementById('chat-container');
        let isFocusRepliesOn = false;
        let activeMode = 'Companion';
        const conversationMemory = [];

        function scrollChatToBottom(smooth = true) {
            const behavior = smooth ? 'smooth' : 'auto';
            requestAnimationFrame(() => {
                chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior });
            });
        }

        const modeIconNameByMode = {
            Companion: 'message-circle-heart',
            'Cognitive Tools': 'brain-circuit',
            Resources: 'library',
        };

        function setCurrentModeIcon(modeName) {
            currentModeIconSlot.className = 'w-4 h-4 flex items-center justify-center';
            if (modeName === 'Cognitive Tools') {
                currentModeIconSlot.classList.add('text-purple-500', 'dark:text-purple-400');
            } else if (modeName === 'Resources') {
                currentModeIconSlot.classList.add('text-emerald-500', 'dark:text-emerald-400');
            } else {
                currentModeIconSlot.classList.add('text-blue-500', 'dark:text-blue-400');
            }
            const iconName = modeIconNameByMode[modeName] || modeIconNameByMode.Companion;
            currentModeIconSlot.innerHTML = `<i data-lucide="${iconName}" class="w-4 h-4"></i>`;
            lucide.createIcons();
        }

        function getModeAccentClasses(modeName) {
            if (modeName === 'Cognitive Tools') {
                return {
                    avatar: 'bg-purple-50 dark:bg-purple-900/30 text-purple-500 dark:text-purple-400',
                    icon: 'brain-circuit',
                };
            }
            if (modeName === 'Resources') {
                return {
                    avatar: 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-500 dark:text-emerald-400',
                    icon: 'library',
                };
            }
            return {
                avatar: 'bg-blue-50 dark:bg-blue-900/30 text-blue-500 dark:text-blue-400',
                icon: 'message-circle-heart',
            };
        }

        function getBotAvatarHtml(modeName) {
            const accent = getModeAccentClasses(modeName);
            return `<div class="w-8 h-8 rounded-full ${accent.avatar} flex items-center justify-center flex-shrink-0">
                <i data-lucide="brain" class="w-5 h-5"></i>
            </div>`;
        }

        setCurrentModeIcon('Companion');

        function isNearBottom() {
            const threshold = 160;
            return (chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight) < threshold;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function prepareBotBodyForFinalContent(element) {
            applyBotTypography(element);
            element.classList.add('whitespace-pre-wrap');
        }

        function applyBotTypography(element, variant = 'reply') {
            if (variant === 'thinking') {
                element.className = 'text-sm leading-6 tracking-tight text-gray-500 dark:text-gray-400 max-w-3xl';
                return;
            }

            element.className = 'text-[15px] leading-7 tracking-[-0.01em] text-gray-700 dark:text-gray-200 max-w-3xl';
        }

        function renderInlineMarkdown(value) {
            let safe = escapeHtml(value || '');
            safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            safe = safe.replace(/__(.+?)__/g, '<strong>$1</strong>');
            safe = safe.replace(/(?<!\*)\*(?!\s)(.+?)(?<!\s)\*(?!\*)/g, '<em>$1</em>');
            safe = safe.replace(/(?<!_)_(?!\s)(.+?)(?<!\s)_(?!_)/g, '<em>$1</em>');
            return safe;
        }

        function formatMarkdownToHtml(md) {
            const source = String(md || '').trim();
            if (!source) return '';

            const blocks = source.split(/\n\s*\n/).map(block => block.trim()).filter(Boolean);
            const rendered = blocks.map((block) => {
                if (/^###\s+/.test(block)) {
                    return `<h3 class="text-lg font-semibold text-gray-900 dark:text-gray-50 mb-1">${renderInlineMarkdown(block.replace(/^###\s+/, ''))}</h3>`;
                }

                if (/^>\s*/.test(block)) {
                    const quoteText = block
                        .replace(/^>\s*/gm, '')
                        .replace(/\n+/g, ' ')
                        .trim();
                    return `<div class="rounded-2xl border border-gray-200/80 dark:border-gray-700 bg-gray-50/80 dark:bg-gray-800/50 px-4 py-3"><p class="text-sm leading-6 text-gray-600 dark:text-gray-300">${renderInlineMarkdown(quoteText)}</p></div>`;
                }

                if (/^-\s+/.test(block)) {
                    const items = block
                        .split('\n')
                        .map(line => line.replace(/^-\s+/, '').trim())
                        .filter(Boolean)
                        .map(line => `<li class="flex gap-2 leading-6"><span class="mt-2 h-1.5 w-1.5 rounded-full bg-blue-400 dark:bg-blue-300 flex-shrink-0"></span><span>${renderInlineMarkdown(line)}</span></li>`)
                        .join('');

                    return `<ul class="space-y-2 my-1">${items}</ul>`;
                }

                if (/^\*\*(.+?)\*\*:\s*(.+)$/s.test(block)) {
                    const match = block.match(/^\*\*(.+?)\*\*:\s*(.+)$/s);
                    if (match) {
                        return `<div class="rounded-2xl border border-gray-200/70 dark:border-gray-700/70 bg-white/70 dark:bg-gray-800/40 px-4 py-3"><p class="text-sm leading-6 text-gray-700 dark:text-gray-200"><strong>${renderInlineMarkdown(match[1])}:</strong> ${renderInlineMarkdown(match[2].replace(/\n+/g, ' '))}</p></div>`;
                    }
                }

                if (/^\*\*(.+?)\*\*$/.test(block)) {
                    const match = block.match(/^\*\*(.+?)\*\*$/);
                    if (match) {
                        return `<h4 class="text-sm font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1">${renderInlineMarkdown(match[1])}</h4>`;
                    }
                }

                return `<p class="text-base leading-7 text-gray-700 dark:text-gray-200">${renderInlineMarkdown(block.replace(/\n+/g, ' '))}</p>`;
            }).join('');

            return `<div class="space-y-4">${rendered}</div>`;
        }

        function formatResourceMarkdownToHtml(md) {
            const lines = String(md || '').split(/\r?\n/).map(line => line.trim());
            if (!lines.some(Boolean)) return '';

            const tips = [];
            let title = '';
            let description = '';
            let hotline = '';
            let index = 0;

            while (index < lines.length && !lines[index]) {
                index += 1;
            }

            if (lines[index]?.startsWith('### ')) {
                title = lines[index].replace(/^###\s+/, '');
                index += 1;
            }

            while (index < lines.length && !lines[index]) {
                index += 1;
            }

            const quoteLines = [];
            while (index < lines.length && lines[index].startsWith('>')) {
                quoteLines.push(lines[index].replace(/^>\s?/, ''));
                index += 1;
            }
            if (quoteLines.length) {
                description = quoteLines.join(' ');
            }

            while (index < lines.length && !lines[index]) {
                index += 1;
            }

            if (lines[index]?.startsWith('**Hotline:**')) {
                hotline = lines[index].replace(/^\*\*Hotline:\*\*\s*/, '');
                index += 1;
            }

            while (index < lines.length && !lines[index]) {
                index += 1;
            }

            if (lines[index]?.startsWith('**Coping Tips:**')) {
                index += 1;
                while (index < lines.length) {
                    const line = lines[index];
                    index += 1;
                    if (!line) continue;
                    if (line.startsWith('- ')) {
                        tips.push(line.replace(/^-\s+/, ''));
                    } else {
                        tips.push(line);
                    }
                }
            }

            const titleText = title ? renderInlineMarkdown(title.replace(/^[^\w]+\s*/, '')) : '';
            const descriptionText = description ? renderInlineMarkdown(description) : '';
            const hotlineText = hotline ? renderInlineMarkdown(hotline) : '';
            const tipsHtml = tips.length
                ? `<ul class="space-y-1.5">${tips.map(tip => `<li class="flex gap-2 text-sm leading-6 text-gray-700 dark:text-gray-200"><span class="mt-2 h-1.5 w-1.5 rounded-full bg-blue-400 dark:bg-blue-300 flex-shrink-0"></span><span>${renderInlineMarkdown(tip)}</span></li>`).join('')}</ul>`
                : '';

            return `<div class="rounded-2xl border border-gray-200/70 dark:border-gray-700/70 bg-white/85 dark:bg-gray-800/45 px-4 py-4 shadow-sm"><div class="flex items-start gap-2"><span class="mt-0.5 text-lg shrink-0">🧠</span><div class="min-w-0 flex-1">${titleText ? `<h3 class="text-base font-semibold tracking-tight text-gray-900 dark:text-gray-50 leading-6">${titleText}</h3>` : ''}${descriptionText ? `<p class="mt-1 text-sm leading-6 text-gray-600 dark:text-gray-300">${descriptionText}</p>` : ''}</div></div><div class="mt-3 rounded-xl border border-gray-200/60 dark:border-gray-700/60 bg-gray-50/70 dark:bg-gray-800/30 px-3 py-2.5"><div class="text-[11px] font-semibold uppercase tracking-[0.18em] text-gray-400 dark:text-gray-500 mb-1">Hotline</div><p class="text-sm leading-6 text-gray-700 dark:text-gray-200">${hotlineText}</p></div>${tipsHtml ? `<div class="mt-3"><div class="text-[11px] font-semibold uppercase tracking-[0.18em] text-gray-400 dark:text-gray-500 mb-2">Coping tips</div>${tipsHtml}</div>` : ''}</div>`;
        }

        async function postJSON(path, payload) {
            const response = await fetch(path, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });

            if (!response.ok) {
                const message = await response.text();
                throw new Error(message || `Request failed with status ${response.status}`);
            }

            return response.json();
        }

        // Send Button State Management
        const disabledClasses = ['bg-surfaceHover', 'text-gray-400', 'dark:bg-gray-700', 'dark:text-gray-500'];
        const enabledClasses = ['bg-gray-800', 'text-white', 'hover:bg-gray-900', 'hover:scale-105', 'dark:bg-gray-200', 'dark:text-gray-900', 'dark:hover:bg-white'];

        // Feature toggle: short/focused bot replies.
        featureToggleBtn.addEventListener('click', () => {
            isFocusRepliesOn = !isFocusRepliesOn;
            featureToggleBtn.classList.toggle('bg-amber-100', isFocusRepliesOn);
            featureToggleBtn.classList.toggle('dark:bg-amber-500/15', isFocusRepliesOn);
            featureToggleBtn.classList.toggle('text-amber-600', isFocusRepliesOn);
            featureToggleBtn.classList.toggle('dark:text-amber-300', isFocusRepliesOn);
            featureToggleBtn.classList.toggle('ring-1', isFocusRepliesOn);
            featureToggleBtn.classList.toggle('ring-amber-300/60', isFocusRepliesOn);
            featureToggleBtn.classList.toggle('dark:ring-amber-400/40', isFocusRepliesOn);
            featureToggleBtn.classList.toggle('shadow-sm', isFocusRepliesOn);
            featureToggleBtn.title = isFocusRepliesOn ? 'Concise Mode: ON' : 'Concise Mode: OFF';
        });

        // Auto-resize textarea
        inputEl.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            
            // Toggle Send button state
            if (this.value.trim().length > 0) {
                sendBtn.disabled = false;
                sendBtn.classList.remove(...disabledClasses);
                sendBtn.classList.add(...enabledClasses);
            } else {
                sendBtn.disabled = true;
                sendBtn.classList.add(...disabledClasses);
                sendBtn.classList.remove(...enabledClasses);
            }
        });

        // Handle Mode Dropdown Toggle
        modeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (modeDropdown.classList.contains('hidden')) {
                modeDropdown.classList.remove('hidden');
                modeDropdown.classList.add('dropdown-enter-active');
            } else {
                closeDropdown();
            }
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!modeDropdown.contains(e.target) && !modeBtn.contains(e.target)) {
                closeDropdown();
            }
        });

        function closeDropdown() {
            if (!modeDropdown.classList.contains('hidden')) {
                modeDropdown.classList.add('hidden');
            }
        }

        // Handle Mode Selection
        modeOptions.forEach(option => {
            option.addEventListener('click', (e) => {
                const modeName = option.getAttribute('data-mode');
                
                // Update button text and icon
                currentModeText.textContent = modeName;
                setCurrentModeIcon(modeName);
                
                closeDropdown();
                inputEl.focus();
            });
        });

        // Handle Suggestion Chips
        document.querySelectorAll('.suggestion-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const text = e.target.closest('button').textContent.trim();
                inputEl.value = text;
                // Trigger input event to resize and enable button
                inputEl.dispatchEvent(new Event('input'));
                inputEl.focus();
            });
        });

        // Simulate Sending Message
        sendBtn.addEventListener('click', handleSend);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled) handleSend();
            }
        });

        function handleSend() {
            const text = inputEl.value.trim();
            if (!text) return;

            // Hide welcome screen, show chat history
            if (!welcomeScreen.classList.contains('hidden')) {
                welcomeScreen.classList.add('hidden');
                chatHistory.classList.remove('hidden');
                chatHistory.classList.add('flex');
            }

            // Append User Message
            appendMessage(text, 'user');
            pushMemory('user', text);

            activeMode = currentModeText.textContent.trim() || 'Companion';
            
            // Clear input
            inputEl.value = '';
            inputEl.style.height = 'auto';
            inputEl.dispatchEvent(new Event('input'));

            requestBotResponse(text, activeMode);
        }

        function pushMemory(role, text) {
            conversationMemory.push({ role, text });
            if (conversationMemory.length > 24) {
                conversationMemory.shift();
            }
        }

        async function requestBotResponse(text, mode) {
            const pendingBubble = appendThinkingMessage(mode);

            try {
                const result = await postJSON('/api/ask', { text, mode, history: conversationMemory });
                const bubbleBody = pendingBubble.querySelector('[data-role="bot-body"]');
                if (!bubbleBody) return;

                if (result.mode === 'crisis' || result.mode === 'resources') {
                    const resource = result.resource || {};
                    const markdown = resource.markdown || 'No resources available.';
                    await typewriterIntoElement(bubbleBody, markdown);
                    bubbleBody.classList.remove('typing-caret');
                    prepareBotBodyForFinalContent(bubbleBody);
                    bubbleBody.classList.remove('whitespace-pre-wrap');
                    bubbleBody.innerHTML = formatResourceMarkdownToHtml(markdown);
                    const links = buildLinksHtml(resource.links || []);
                    if (links) {
                        bubbleBody.insertAdjacentHTML('beforeend', links);
                    }
                    pushMemory('assistant', markdown);
                    return;
                }

                let answer = String(result.result || 'No response available.');
                if (isFocusRepliesOn) {
                    answer = answer.slice(0, 320);
                }

                await typewriterIntoElement(bubbleBody, answer);
                bubbleBody.classList.remove('typing-caret');
                prepareBotBodyForFinalContent(bubbleBody);
                bubbleBody.innerHTML = formatMarkdownToHtml(answer);
                pushMemory('assistant', answer);
            } catch (error) {
                const bubbleBody = pendingBubble.querySelector('[data-role="bot-body"]');
                if (bubbleBody) {
                    bubbleBody.classList.remove('typing-caret');
                    bubbleBody.innerHTML = "<p>I couldn't complete that request right now. Please try again in a moment.</p>";
                }
                console.error(error);
            }
        }

        function buildLinksHtml(links = []) {
            if (!Array.isArray(links) || !links.length) return '';
            return `<div class="flex flex-wrap gap-2 mt-4 pt-2">${links
                .map(item => `<a class="inline-flex items-center px-3 py-1.5 rounded-full border border-gray-200 dark:border-gray-700 text-sm text-gray-700 dark:text-gray-200 bg-white/70 dark:bg-gray-800/60 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.label)}</a>`)
                .join('')}</div>`;
        }

        function appendThinkingMessage(mode = activeMode) {
            const accent = getModeAccentClasses(mode);
            const msgDiv = document.createElement('div');
            msgDiv.className = 'flex items-center gap-4 w-full bot-fade-in';
            msgDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full ${accent.avatar} flex items-center justify-center flex-shrink-0">
                    <i data-lucide="brain" class="w-5 h-5"></i>
                </div>
                <div class="text-gray-800 dark:text-gray-200 max-w-3xl min-h-8 flex items-center">
                    <div class="flex items-center gap-2" data-role="bot-body">
                        <span>Thinking...</span>
                        <span class="thinking-dot"></span>
                        <span class="thinking-dot"></span>
                        <span class="thinking-dot"></span>
                    </div>
                </div>
            `;
            const body = msgDiv.querySelector('[data-role="bot-body"]');
            if (body) applyBotTypography(body, 'thinking');
            chatHistory.appendChild(msgDiv);
            lucide.createIcons();
            scrollChatToBottom(true);
            return msgDiv;
        }

        async function typewriterIntoElement(element, fullText) {
            element.classList.add('typing-caret');
            element.classList.add('whitespace-pre-wrap');
            element.textContent = '';

            const text = String(fullText || '');
            const step = Math.max(1, Math.floor(text.length / 140));

            for (let i = 0; i < text.length; i += step) {
                element.textContent = text.slice(0, i + step);
                if (isNearBottom()) {
                    scrollChatToBottom(false);
                }
                await new Promise(resolve => setTimeout(resolve, 10));
            }

            element.textContent = text;
        }

        function appendMessage(text, sender, links = [], isHtml = false, mode = activeMode) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex items-start gap-4 w-full ${sender === 'bot' ? 'bot-fade-in' : 'animate-fade-in'} ${sender === 'user' ? 'justify-end' : ''}`;
            
            if (sender === 'bot') {
                const linksHtml = buildLinksHtml(links);
                const accent = getModeAccentClasses(mode);
                msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-full ${accent.avatar} flex items-center justify-center flex-shrink-0">
                        <i data-lucide="brain" class="w-5 h-5"></i>
                    </div>
                    <div class="max-w-3xl space-y-4 text-gray-800 dark:text-gray-200">
                        <div class="bot-reply-content whitespace-pre-wrap text-[15px] leading-7 tracking-[-0.01em] text-gray-700 dark:text-gray-200">${isHtml ? text : escapeHtml(text)}</div>
                        ${linksHtml}
                    </div>
                `;
            } else {
                msgDiv.innerHTML = `
                    <div class="bg-gray-100 dark:bg-gray-800 rounded-3xl px-5 py-3 text-gray-800 dark:text-gray-200 max-w-2xl leading-relaxed">
                        ${escapeHtml(text)}
                    </div>
                `;
            }
            
            chatHistory.appendChild(msgDiv);
            lucide.createIcons();
            
            scrollChatToBottom(true);
        }

        // Quick health check in browser console
        fetch('/api/health').then(r => r.json()).then(data => console.log('MindPal API:', data)).catch(console.error);

    </script>
</body>
</html>
