# backend/safety/crisis_patterns_ar.yaml

schema_version: 1
locale: ar
description: >-
  Arabic deterministic input safety patterns for MindPal. These rules are used
  before any LLM call. They include Modern Standard Arabic and common Egyptian
  Arabic variants. They store rule metadata only; raw user text must not be
  persisted by the classifier.

rules:
  - id: ar_self_harm_imminent_direct
    level: self_harm_imminent
    action: deterministic_response
    bypass_llm: true
    response_template_id: imminent_self_harm_ar
    should_log: true
    user_visible_category: immediate_safety
    confidence: 1.0
    priority: 1000
    match_mode: any
    patterns:
      - '(?i)(?:丕賳丕|兀賳丕)?\s*(?:賴賯鬲賱|丨賯鬲賱|爻兀賯鬲賱|丕賯鬲賱|兀賯鬲賱)\s+(?:賳賮爻賷|賳賮爻賶)'
      - '(?i)(?:丕賳丕|兀賳丕)?\s*(?:賴賳鬲丨乇|丨賳鬲丨乇|爻兀賳鬲丨乇|丕賳鬲丨乇|兀賳鬲丨乇)'
      - '(?i)(?:丕賳丕|兀賳丕)?\s*(?:賴賳賴賷|丨丕賳賴賷|爻兀賳賴賷|丕賳賴賶|兀賳賴賷)\s+(?:丨賷丕鬲賷|丨賷丕鬲賶)'
      - '(?i)(?:丕賳丕|兀賳丕)?\s*(?:賴禺賱氐|丨禺賱氐)\s+(?:毓賱賶|毓賱賷)\s+(?:賳賮爻賷|賳賮爻賶)'
      - '(?i)(?:丕賳丕|兀賳丕)?\s*(?:賴兀匕賷|賴丕匕賷|丨兀匕賷|丨丕匕賷|爻兀丐匕賷|丕丐匕賷|兀丐匕賷)\s+(?:賳賮爻賷|賳賮爻賶)'
      - '(?i)(?:賲卮|賲賵|賱爻鬲)\s+賯丕丿乇\s+丕賲賳毓\s+(?:賳賮爻賷|賳賮爻賶)\s+(?:丕賳賷|廿賳賾賷|丕賳賳賷|兀賳賳賷)?\s*(?:丕毓賲賱賴丕|兀毓賲賱賴丕|丕丐匕賷\s+賳賮爻賷|兀丐匕賷\s+賳賮爻賷|丕賳鬲丨乇|兀賳鬲丨乇)'
      - '(?i)(?:丿賷|賴匕賴)\s+(?:丌禺乇|丕禺乇)\s+(?:乇爻丕賱丞|賰賱丕賲|賲乇丞)'

